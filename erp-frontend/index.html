<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ERP Bimonetario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Centramos la tarjeta de login en el medio de la pantalla */
        body { 
            background-color: #e9ecef; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
        }
        .login-card { 
            width: 100%; 
            max-width: 400px; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            background-color: white; 
        }
        .brand-logo {
            width: 60px;
            height: 60px;
            background-color: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 15px auto;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo fw-bold">ERP</div>
        <h4 class="text-center mb-4 fw-bold text-dark">Iniciar Sesión</h4>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-muted fw-bold">Usuario</label>
                <input type="text" id="username" class="form-control form-control-lg bg-light" placeholder="Ej. pedro_cajero" required autofocus autocomplete="username">
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted fw-bold">Contraseńa</label>
                <input type="password" id="password" class="form-control form-control-lg bg-light" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Ingresar al Sistema</button>
        </form>

        <div id="mensajeError" class="alert alert-danger mt-4 d-none text-center" role="alert"></div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
